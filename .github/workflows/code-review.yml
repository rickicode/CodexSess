name: CodexSess Review And Autofix

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:
    inputs:
      target_ref:
        description: "Target branch/tag/sha for manual run (e.g. main)"
        required: false
        default: "main"
        type: string
      review_scope:
        description: "Review scope: diff (changes) or full (entire repository)"
        required: false
        default: "full"
        type: choice
        options:
          - full
          - diff
      review_focus:
        description: "Optional focus area for manual run (e.g. auth, api, performance, tests)"
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  review_autofix:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        env:
          CODEXSESS_URL: ${{ secrets.CODEXSESS_URL }}
          CODEXSESS_API_KEY: ${{ secrets.CODEXSESS_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${CODEXSESS_URL:-}" ] || [ -z "${CODEXSESS_API_KEY:-}" ]; then
            echo "Missing CODEXSESS_URL or CODEXSESS_API_KEY secret"
            exit 1
          fi

      - name: Resolve execution context
        id: ctx
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            let mode = 'manual';
            let reportToPR = 'false';
            let prNumber = '';
            let title = '';
            let baseSha = '';
            let headSha = '';
            let checkoutRepo = `${owner}/${repo}`;
            let checkoutRef = (context.payload.inputs && context.payload.inputs.target_ref) || '${{ github.event.inputs.target_ref }}' || 'main';
            let headRef = checkoutRef;
            let sameRepo = 'true';

            if (context.eventName === 'pull_request') {
              mode = 'pr';
              reportToPR = 'true';
              const pr = context.payload.pull_request;
              prNumber = String(pr.number);
              title = pr.title || `PR #${pr.number}`;
              baseSha = pr.base.sha;
              headSha = pr.head.sha;
              checkoutRepo = pr.head.repo.full_name;
              checkoutRef = pr.head.ref;
              headRef = pr.head.ref;
              sameRepo = pr.head.repo.full_name === `${owner}/${repo}` ? 'true' : 'false';
            } else {
              title = `Manual review on ${checkoutRef}`;
            }

            core.setOutput('mode', mode);
            core.setOutput('report_to_pr', reportToPR);
            core.setOutput('pr_number', prNumber);
            core.setOutput('title', title);
            core.setOutput('base_sha', baseSha);
            core.setOutput('head_sha', headSha);
            core.setOutput('checkout_repo', checkoutRepo);
            core.setOutput('checkout_ref', checkoutRef);
            core.setOutput('head_ref', headRef);
            core.setOutput('same_repo', sameRepo);

      - name: Resolve review mode
        id: mode
        env:
          REVIEW_SCOPE_INPUT: ${{ github.event.inputs.review_scope || '' }}
          REVIEW_FOCUS_INPUT: ${{ github.event.inputs.review_focus || '' }}
        run: |
          set -euo pipefail
          if [ "${{ steps.ctx.outputs.mode }}" = "pr" ]; then
            scope="diff"
            focus=""
          else
            scope="full"
            case "${REVIEW_SCOPE_INPUT:-full}" in
              full|diff) scope="${REVIEW_SCOPE_INPUT:-full}" ;;
              *) scope="full" ;;
            esac
            focus="$(printf '%s' "${REVIEW_FOCUS_INPUT:-}" | tr -d '\r' | xargs)"
          fi
          echo "scope=${scope}" >> "$GITHUB_OUTPUT"
          echo "focus=${focus}" >> "$GITHUB_OUTPUT"

      - name: Checkout target
        uses: actions/checkout@v6
        with:
          repository: ${{ steps.ctx.outputs.checkout_repo }}
          ref: ${{ steps.ctx.outputs.checkout_ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install Codex CLI
        run: npm install -g @openai/codex@latest

      - name: Download auth.json from CodexSess
        env:
          CODEXSESS_URL: ${{ secrets.CODEXSESS_URL }}
          CODEXSESS_API_KEY: ${{ secrets.CODEXSESS_API_KEY }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.codex"
          curl -fsSL \
            "${CODEXSESS_URL%/}/v1/auth.json" \
            -H "Authorization: Bearer ${CODEXSESS_API_KEY}" \
            -o "$HOME/.codex/auth.json"
          jq empty "$HOME/.codex/auth.json"
          chmod 600 "$HOME/.codex/auth.json"

      - name: Build review diff
        id: diff
        run: |
          set -euo pipefail
          : > pr.diff
          has_diff="false"
          if [ "${{ steps.mode.outputs.scope }}" = "diff" ]; then
            if [ "${{ steps.ctx.outputs.mode }}" = "pr" ]; then
              git diff --unified=3 "${{ steps.ctx.outputs.base_sha }}...${{ steps.ctx.outputs.head_sha }}" > pr.diff
            else
              if git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
                git diff --unified=3 HEAD~1..HEAD > pr.diff
              fi
            fi
            if [ -s pr.diff ]; then
              has_diff="true"
            fi
          fi
          echo "has_diff=${has_diff}" >> "$GITHUB_OUTPUT"

      - name: Run review with Codex
        env:
          BASE_SHA: ${{ steps.ctx.outputs.base_sha }}
          HEAD_SHA: ${{ steps.ctx.outputs.head_sha }}
          REVIEW_TITLE: ${{ steps.ctx.outputs.title }}
          REVIEW_SCOPE: ${{ steps.mode.outputs.scope }}
          REVIEW_FOCUS: ${{ steps.mode.outputs.focus }}
          EXEC_MODE: ${{ steps.ctx.outputs.mode }}
          HAS_DIFF: ${{ steps.diff.outputs.has_diff }}
        run: |
          set -euo pipefail
          scope_instruction='Review the ENTIRE repository (not limited to current diff). Start from the current working tree and inspect relevant files directly.'
          if [ "${REVIEW_SCOPE}" = "diff" ]; then
            scope_instruction='Use git to inspect changes in `pr.diff`.'
            if [ "${HAS_DIFF}" != "true" ]; then
              scope_instruction='No diff snapshot available. Fall back to repository-level review and report this condition clearly.'
            fi
          fi
          focus_instruction=''
          if [ -n "${REVIEW_FOCUS}" ]; then
            focus_instruction="Extra focus requested by maintainer: ${REVIEW_FOCUS}"
          fi
          cat > review_prompt.txt <<PROMPT
          You are reviewing code changes.
          Execution mode: ${EXEC_MODE}
          Context title: "${REVIEW_TITLE}"
          Focus on bugs, regressions, security issues, and missing tests.
          Output concise markdown with:
          1) Summary
          2) Findings ordered by severity (Critical/High/Medium/Low)
          3) Concrete fix suggestions
          4) Residual testing gaps
          ${scope_instruction}
          ${focus_instruction}
          PROMPT
          REVIEW_PROMPT="$(cat review_prompt.txt)"
          codex exec \
            --sandbox read-only \
            --skip-git-repo-check \
            -m gpt-5.2-codex \
            "$REVIEW_PROMPT" > review.txt
          if [ ! -s review.txt ]; then
            echo "No review output generated." > review.txt
          fi

      - name: Run autofix with Codex
        env:
          REVIEW_TITLE: ${{ steps.ctx.outputs.title }}
          REVIEW_SCOPE: ${{ steps.mode.outputs.scope }}
          REVIEW_FOCUS: ${{ steps.mode.outputs.focus }}
        run: |
          set -euo pipefail
          REVIEW_SNIPPET="$(head -c 20000 review.txt | tr '\0' ' ')"
          mode_hint='Primary target: full repository findings.'
          if [ "${REVIEW_SCOPE}" = "diff" ]; then
            mode_hint='Primary target: diff findings.'
          fi
          focus_hint=''
          if [ -n "${REVIEW_FOCUS}" ]; then
            focus_hint="Maintainer focus: ${REVIEW_FOCUS}"
          fi
          cat > autofix_prompt.txt <<PROMPT
          You are applying safe autofixes based on the latest review report.
          Context title: "${REVIEW_TITLE}"
          ${mode_hint}
          ${focus_hint}

          Review findings to address:
          $REVIEW_SNIPPET

          Instructions:
          - Apply minimal, safe fixes directly in repository files.
          - Prioritize Critical/High findings first, then Medium.
          - Do not modify unrelated files.
          - Keep behavior backward-compatible unless fix requires change.
          - If a finding cannot be safely fixed automatically, skip it.
          - After edits, leave the repo in a consistent state.
          PROMPT
          AUTOFIX_PROMPT="$(cat autofix_prompt.txt)"
          codex exec \
            --sandbox workspace-write \
            --skip-git-repo-check \
            -m gpt-5.2-codex \
            "$AUTOFIX_PROMPT" > autofix.txt || true

      - name: Commit and push autofix
        id: pushfix
        if: steps.ctx.outputs.mode == 'manual' || steps.ctx.outputs.same_repo == 'true'
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            echo "branch=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "codexsess-bot"
          git config user.email "codexsess-bot@users.noreply.github.com"

          target_ref="${{ steps.ctx.outputs.head_ref }}"
          if [ "${{ steps.ctx.outputs.mode }}" = "manual" ]; then
            target_ref="codexsess/manual-autofix-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
            git checkout -b "${target_ref}"
          fi

          git add -A
          git commit -m "chore: codexsess autofix (${target_ref})"
          git push origin "HEAD:${target_ref}"

          echo "pushed=true" >> "$GITHUB_OUTPUT"
          echo "branch=${target_ref}" >> "$GITHUB_OUTPUT"

      - name: Report result to PR
        if: steps.ctx.outputs.report_to_pr == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = Number('${{ steps.ctx.outputs.pr_number }}');
            const marker = '<!-- codexsess-review-autofix -->';
            let review = 'No review output generated.';
            try {
              review = fs.readFileSync('review.txt', 'utf8').trim() || review;
            } catch (_) {}
            if (review.length > 60000) review = review.slice(0, 60000) + '\n\n... (truncated)';

            const reviewScope = '${{ steps.mode.outputs.scope }}' || 'diff';
            const reviewFocus = '${{ steps.mode.outputs.focus }}' || '-';
            const pushed = '${{ steps.pushfix.outputs.pushed || 'false' }}' === 'true';
            const sameRepo = '${{ steps.ctx.outputs.same_repo }}' === 'true';
            let autofixStatus = '';
            if (!sameRepo) {
              autofixStatus = 'Autofix generated but push skipped (fork PR / external head repository).';
            } else if (pushed) {
              autofixStatus = 'Autofix commit has been pushed to this PR branch.';
            } else {
              autofixStatus = 'No safe autofix changes were applied.';
            }

            const body = `${marker}
            ## CodexSess Automated Review

            - Scope: \`${reviewScope}\`
            - Focus: \`${reviewFocus}\`

            ${review}

            ### Autofix Status
            ${autofixStatus}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100
            });
            const existing = comments.find(c =>
              c.user?.type === 'Bot' &&
              typeof c.body === 'string' &&
              c.body.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }

      - name: Manual run summary
        if: steps.ctx.outputs.mode == 'manual'
        run: |
          {
            echo "## CodexSess Manual Review Result"
            echo ""
            echo "- Scope: \`${{ steps.mode.outputs.scope }}\`"
            echo "- Focus: \`${{ steps.mode.outputs.focus || '-' }}\`"
            echo "- Target ref: \`${{ steps.ctx.outputs.checkout_ref }}\`"
            if [ "${{ steps.pushfix.outputs.pushed }}" = "true" ]; then
              echo "- Autofix branch: \`${{ steps.pushfix.outputs.branch }}\`"
            else
              echo "- Autofix branch: \`none (no safe changes)\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
