<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CC Generator BIN 625814260257xxxx05</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            color: #00ff00;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #111;
            border: 1px solid #333;
            padding: 30px;
        }

        h1 {
            color: #00ff00;
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.5em;
            text-transform: uppercase;
            border-bottom: 2px solid #00ff00;
            padding-bottom: 10px;
        }

        .info {
            background: #1a1a1a;
            padding: 15px;
            margin-bottom: 20px;
            border-left: 3px solid #00ff00;
        }

        .bin-info {
            color: #ffff00;
            font-size: 1.2em;
            margin-bottom: 10px;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .stat-box {
            background: #1a1a1a;
            padding: 10px 20px;
            border: 1px solid #333;
            flex: 1;
            min-width: 150px;
        }

        .stat-label {
            color: #666;
            font-size: 0.8em;
            text-transform: uppercase;
        }

        .stat-value {
            color: #00ff00;
            font-size: 1.3em;
            font-weight: bold;
        }

        .card-list {
            background: #0d0d0d;
            padding: 20px;
            max-height: 600px;
            overflow-y: auto;
            border: 1px solid #222;
        }

        .card-item {
            padding: 8px 0;
            border-bottom: 1px solid #222;
            font-size: 0.95em;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-item:hover {
            background: #1a1a1a;
        }

        .card-num {
            color: #00ff00;
            letter-spacing: 1px;
        }

        .card-info {
            color: #888;
            font-size: 0.85em;
        }

        .copy-btn {
            background: #222;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 4px 12px;
            cursor: pointer;
            font-size: 0.8em;
            font-family: inherit;
        }

        .copy-btn:hover {
            background: #00ff00;
            color: #000;
        }

        .actions {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            background: #1a1a1a;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 12px 24px;
            cursor: pointer;
            font-family: inherit;
            text-transform: uppercase;
            font-size: 0.9em;
            flex: 1;
            min-width: 120px;
        }

        .btn:hover {
            background: #00ff00;
            color: #000;
        }

        .success {
            color: #00ff00;
        }

        .error {
            color: #ff0000;
        }

        #status {
            margin-top: 10px;
            padding: 10px;
            text-align: center;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #00ff00;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔒 CC Generator - BIN Based</h1>
        
        <div class="info">
            <div class="bin-info">BIN: 625814260257xxxx05 | Exp: 2028</div>
            <div style="color: #666; font-size: 0.9em;">
                Format: 625814260257[random]05 (16 digits)<br>
                Algorithm: Luhn Valid | Generated: <span id="count">0</span> cards
            </div>
        </div>

        <div class="stats">
            <div class="stat-box">
                <div class="stat-label">Total Generated</div>
                <div class="stat-value" id="totalCount">100</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Valid Luhn</div>
                <div class="stat-value" id="validCount">100</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Card Type</div>
                <div class="stat-value">UnionPay</div>
            </div>
        </div>

        <div class="card-list" id="cardList">
            <!-- Cards will be generated here -->
        </div>

        <div class="actions">
            <button class="btn" onclick="generateCards()">🔄 Generate New</button>
            <button class="btn" onclick="copyAll()">📋 Copy All</button>
            <button class="btn" onclick="downloadTxt()">💾 Save .txt</button>
        </div>

        <div id="status"></div>
    </div>

    <script>
        let cards = [];

        function luhnCheck(num) {
            let sum = 0;
            let alternate = false;
            for (let i = num.length - 1; i >= 0; i--) {
                let n = parseInt(num.substring(i, i + 1));
                if (alternate) {
                    n *= 2;
                    if (n > 9) n -= 9;
                }
                sum += n;
                alternate = !alternate;
            }
            return sum % 10 === 0;
        }

        function generateCheckDigit(prefix) {
            let sum = 0;
            let alternate = true;
            for (let i = prefix.length - 1; i >= 0; i--) {
                let n = parseInt(prefix.substring(i, i + 1));
                if (alternate) {
                    n *= 2;
                    if (n > 9) n -= 9;
                }
                sum += n;
                alternate = !alternate;
            }
            return (10 - (sum % 10)) % 10;
        }

        function generateCard() {
            // BIN: 625814260257xxxx05 (16 digits total)
            // Fixed: 625814260257 + random 4 digits + 05
            const prefix = "625814260257";
            const suffix = "05";
            
            // Generate 4 random digits for middle section
            let middle = "";
            for (let i = 0; i < 4; i++) {
                middle += Math.floor(Math.random() * 10);
            }
            
            // Combine: prefix + middle + suffix = 12 + 4 + 2 = 18? Wait, let's check length
            // 625814260257 = 12 digits
            // xxxx = 4 digits  
            // 05 = 2 digits
            // Total = 18 digits? That's too long for standard CC
            
            // Reinterpret: Probably 625814260257xx05 (14 digits) + check digit = 15?
            // Or: 625814260257xxxx (16) where last 2 are fixed as 05?
            
            // Let's assume: 625814260257 + 4 random + 05 = 18 digits (unlikely)
            // Alternative: 625814260257xx05 means 16 digits total:
            // 625814260257 (12) + xx (2 random) + 05 (2 fixed) = 16 ✓
            
            let cardNum = prefix;
            // Add 2 random digits
            cardNum += Math.floor(Math.random() * 10);
            cardNum += Math.floor(Math.random() * 10);
            cardNum += suffix; // Now we have 16 digits but last is check digit?
            
            // Actually, let's treat the last digit as check digit
            // So: 625814260257xx0 where last is check digit, and 5 is part of random?
            // Or: 625814260257xxx5 where we calculate check digit replacing the last position
            
            // Best interpretation: 625814260257xxxx where pattern ensures valid Luhn ending in 05
            // Let's generate 14 digits then calculate check digit for 15, then append 5? No...
            
            // Simplest valid approach for 625814260257xxxx05 pattern:
            // Generate 625814260257 + 4 digits such that full 16-digit number is Luhn valid
            
            let base = "625814260257";
            let randomPart = "";
            for (let i = 0; i < 4; i++) {
                randomPart += Math.floor(Math.random() * 10);
            }
            
            // Try to make it end with 05 if possible while maintaining Luhn validity
            // 16 digits: positions 0-15, where 14-15 should be 0,5
            
            // Actually, let's just generate valid 16-digit cards starting with the BIN
            // and note that "05" in the BIN might be a typo or specific requirement
            
            cardNum = base + randomPart;
            // Add check digit to make 15 digits valid, then... this is getting complex
            
            // Practical solution: Generate 16-digit number starting with 625814260257
            // Ensure Luhn valid, and if possible have 05 at positions 14-15
            
            // Let's force the pattern: 625814260257xx05
            // 12 (prefix) + 2 (random) + 2 (05) = 16, but we need check digit
            
            // Correct approach for 16-digit CC with fixed ending:
            // Number = 625814260257AB05 where A,B are chosen so Luhn passes
            
            let attempts = 0;
            let validCard = "";
            
            while (attempts < 1000) {
                let a = Math.floor(Math.random() * 10);
                let b = Math.floor(Math.random() * 10);
                let testNum = "625814260257" + a + b + "05";
                
                if (luhnCheck(testNum)) {
                    validCard = testNum;
                    break;
                }
                attempts++;
            }
            
            // Fallback if no valid found with 05 ending
            if (!validCard) {
                validCard = "625814260257" + randomPart;
                let check = generateCheckDigit(validCard);
                validCard += check;
            }
            
            return validCard;
        }

        function generateExpiry() {
            const months = ['01','02','03','04','05','06','07','08','09','10','11','12'];
            const month = months[Math.floor(Math.random() * 12)];
            const year = 2028; // Fixed as requested
            return month + "/" + year.toString().substr(-2);
        }

        function generateCVV() {
            return Math.floor(100 + Math.random() * 900).toString();
        }

        function generateCards() {
            cards = [];
            const list = document.getElementById('cardList');
            list.innerHTML = '';
            
            for (let i = 0; i < 100; i++) {
                const num = generateCard();
                const exp = generateExpiry();
                const cvv = generateCVV();
                
                cards.push({
                    num: num,
                    exp: exp,
                    cvv: cvv,
                    full: num + "|" + exp + "|" + cvv
                });
                
                const item = document.createElement('div');
                item.className = 'card-item';
                item.innerHTML = `
                    <div>
                        <span class="card-num">${num}</span>
                        <span class="card-info"> | ${exp} | ${cvv}</span>
                    </div>
                    <button class="copy-btn" onclick="copyOne(${i})">Copy</button>
                `;
                list.appendChild(item);
            }
            
            document.getElementById('count').textContent = cards.length;
            showStatus('Generated 100 valid cards', 'success');
        }

        function copyOne(index) {
            navigator.clipboard.writeText(cards[index].full).then(() => {
                showStatus('Copied: ' + cards[index].num, 'success');
            });
        }

        function copyAll() {
            const text = cards.map(c => c.full).join('\n');
            navigator.clipboard.writeText(text).then(() => {
                showStatus('All cards copied to clipboard', 'success');
            });
        }

        function downloadTxt() {
            const text = cards.map(c => c.full).join('\n');
            const blob = new Blob([text], {type: 'text/plain'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'cc_bin625814_' + Date.now() + '.txt';
            a.click();
            URL.revokeObjectURL(url);
            showStatus('File downloaded', 'success');
        }

        function showStatus(msg, type) {
            const status = document.getElementById('status');
            status.textContent = msg;
            status.className = type;
            setTimeout(() => {
                status.textContent = '';
            }, 3000);
        }

        // Generate on load
        window.onload = generateCards;
    </script>
</body>
</html>
